packages:
  - apps/*
  - packages/*
  - tools/*

catalogMode: prefer

catalog:
  "@types/node": ^24
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vite-plus: latest
  electron: ^39.8.10
  drizzle-orm: ^0.45.2
  better-sqlite3: ^12.11.1
  drizzle-kit: ^0.31.10
  "@types/better-sqlite3": ^7.6.13
  sonner: ^2.0.7
  ai: ^7.0.14
  "@ai-sdk/react": ^4.0.15
  "@ai-sdk/openai": ^4.0.7
  "@ai-sdk/anthropic": ^4.0.7
  "@ai-sdk/google": ^4.0.8
  "@base-ui/react": ^1.6.0
  motion: ^12.42.2
  "@openai/agents": ^0.12.0
  "@openai/agents-extensions": ^0.12.0
  zod: ^4.4.3
  "@ai-sdk/mcp": ^2.0.7
  shadcn: ^4.13.0
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  tailwind-merge: ^3.6.0
  lucide-react: ^1.23.0
  tw-animate-css: ^1.4.0
  mem0ai: ^3.0.13
overrides:
  vite: "catalog:"
  vitest: "catalog:"
  "shadcn>zod": ^3.25.76
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
allowBuilds:
  electron: true
  electron-winstaller: false
  esbuild: false
  better-sqlite3: true
  '@google/genai': set this to true or false
  protobufjs: set this to true or false
